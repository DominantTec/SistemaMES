services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-server
    ports:
      - 14330:1433
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    volumes:
      - mssql-data:/var/opt/mssql
      - ../init.sql:/scripts/init.sql:ro
      - ../entrypoint.sh:/usr/src/entrypoint.sh:ro
    env_file:
      - .env
    entrypoint: ["/bin/bash", "/usr/src/entrypoint.sh"]
    networks:
      - network1

    healthcheck:
      test: ["CMD-SHELL", "[ -f /var/opt/mssql/.init-done ] && bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 120s

  # --- SIMULADOR DE MÁQUINAS FANTASMA (Linha 2 – LINHA_SIMULADA) ---
  # Para desativar: mude SIMULADOR_ENABLED=false no .env
  simulador:
    build:
      network: host
      context: ./monitoramento
      dockerfile: Dockerfile
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DRIVER=${DB_DRIVER}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SIMULADOR_ENABLED=${SIMULADOR_ENABLED}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mssql:
        condition: service_healthy
    command: python simulator.py
    networks:
      - network1

  # --- SEU COLETOR MODBUS - mantém como está ---
  monitoramento:
    build:
      network: host
      context: ./monitoramento
      dockerfile: Dockerfile
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - IHMS=${IHMS}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mssql:
        condition: service_healthy
    command: python -m main
    networks:
      - network1

  # --- NOVO: FASTAPI (API do seu sistema) ---
  api:
    build:
      network: host
      context: .
      dockerfile: ./api/Dockerfile
    container_name: pcp-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      mssql:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    networks:
      - network1


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcp-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - network1

networks:
  network1:
    external: true
    name: docker-host-bridge

volumes:
  mssql-data: