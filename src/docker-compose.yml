services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-server
    ports:
      - 1433:1433
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    volumes:
      - mssql-data:/var/opt/mssql
      - ../init.sql:/scripts/init.sql:ro
      - ../entrypoint.sh:/usr/src/entrypoint.sh:ro
    env_file:
      - .env
    entrypoint: ["/bin/bash", "/usr/src/entrypoint.sh"]
    # restart: always
    networks:
      - network1

    healthcheck:
      test: ["CMD-SHELL", "[ -f /var/opt/mssql/.init-done ] && bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 120s

  frontend:
    build:
      network: host
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mssql:
        condition: service_healthy
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./frontend:/app
    networks:
      - network1
  
  monitoramento:
    build:
      network: host
      context: ./monitoramento
      dockerfile: Dockerfile
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - IHMS=${IHMS}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mssql:
        condition: service_healthy
    command: python -m main
    networks:
      - network1

networks:
  network1:
    external: true
    name: docker-host-bridge

volumes:
  mssql-data: